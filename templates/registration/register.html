<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Exp Colis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        .container { max-width: 450px; margin: 60px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-bottom: 20px; text-align: center; }
        p { margin-bottom: 15px; }
        input { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 4px; }
        .btn { width: 100%; padding: 11px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 5px; }
        .btn:hover { background: #1557b0; }
        .helptext { font-size: 0.78rem; color: #888; margin-top: 3px; }
        .errorlist { color: #ea4335; font-size: 0.82rem; list-style: none; margin-top: 3px; }
        .links { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .links a { color: #1a73e8; text-decoration: none; }
        .divider { text-align: center; margin: 15px 0; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h2>🚚 Créer un compte</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <p>
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
            <small class="helptext">{{ field.help_text }}</small>
            {% endif %}
            {% if field.errors %}
            <ul class="errorlist">
                {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
            </ul>
            {% endif %}
        </p>
        {% endfor %}
        <button type="submit" class="btn">S'inscrire</button>
    </form>
    <div class="divider">— ou —</div>
    <div class="links">
        Déjà un compte? <a href="/accounts/login/">Se connecter</a>
    </div>
</div>
</body>
</html>
