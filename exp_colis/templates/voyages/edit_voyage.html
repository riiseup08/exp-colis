<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Modifier Voyage</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; }
    .container { max-width: 500px; margin: 60px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 20px; color: #fbbc04; } p { margin-bottom: 15px; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 4px; }
    .btn { padding: 10px 20px; background: #fbbc04; color: #333; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1rem; }
    .back { display: block; text-align: center; margin-top: 15px; color: #1a73e8; text-decoration: none; }
</style></head>
<body><div class="container">
    <h2>✏️ Modifier le Voyage</h2>
    <form method="post">{% csrf_token %}
        {% for field in form %}<p><label>{{ field.label }}</label>{{ field }}</p>{% endfor %}
        <button type="submit" class="btn">Sauvegarder</button>
    </form>
    <a href="{% url 'exp_colis:dashboard' %}" class="back">← Retour</a>
</div></body></html>
