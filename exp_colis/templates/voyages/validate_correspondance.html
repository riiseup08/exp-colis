<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Valider Correspondance</title>
<style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; }
    .container { max-width: 450px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; }
    h2 { color: #1a73e8; margin-bottom: 15px; }
    p { margin-bottom: 20px; color: #666; }
    .btn { padding: 10px 25px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    .back { display: inline-block; margin-left: 10px; color: #ea4335; text-decoration: none; }
</style></head>
<body><div class="container">
    <h2>✅ Valider la Correspondance</h2>
    <p>Demande: <strong>{{ correspondance.demande }}</strong><br>Voyage: <strong>{{ correspondance.voyage }}</strong></p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="btn">Confirmer</button>
        <a href="{% url 'exp_colis:dashboard' %}" class="back">Annuler</a>
    </form>
</div></body></html>
