<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Demande</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        .container { max-width: 500px; margin: 60px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #34a853; }
        p { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 4px; }
        .btn { padding: 10px 20px; background: #34a853; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1rem; }
        .back { display: block; text-align: center; margin-top: 15px; color: #1a73e8; text-decoration: none; }
        .errorlist { color: red; font-size: 0.85rem; list-style: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>📦 Ajouter une Demande</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <p>
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
        </p>
        {% endfor %}
        <button type="submit" class="btn">Enregistrer</button>
    </form>
    <a href="{% url 'exp_colis:dashboard' %}" class="back">← Retour au Dashboard</a>
</div>
</body>
</html>
